server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    location = /playlist_emby_clean.m3u8 {
        try_files $uri =404;
    }

    location = /epg.xml {
        types {
            text/xml xml;
        }
        try_files $uri =404;
    }

    location /ui/ {
        proxy_pass http://playlist-admin:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://playlist-admin:8780;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
